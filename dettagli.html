<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dettaglio domanda – Asd Romatletica</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header class="hero">
    <div class="container">
      <div class="hero-card" style="padding-bottom:24px">
        <div class="hero-grid">
          <div>
            <div id="breadcrumb" class="small" style="color:rgba(255,255,255,.8);margin-bottom:8px"></div>
            <h1 id="pageTitle">Dettaglio domanda</h1>
            <p id="meta"></p>
          </div>
          <div class="logo-wrap"><img src="logo.png" alt="Logo Asd Romatletica" /></div>
        </div>
      </div>
    </div>
  </header>

  <main class="section">
    <div class="container grid-2">
      <div class="panel">
        <h2 id="questionTitle"></h2>
        <div id="summaryBox"></div>
        <div class="canvas-wrap" style="height:360px;margin-top:16px"><canvas id="detailChart"></canvas></div>
      </div>
      <div class="panel">
        <h2>Tabella dettagliata</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Risposta</th>
                <th>Conteggio</th>
                <th>% su base sezione</th>
                <th>% su risposte valide</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="container section">
      <div class="panel">
        <h2>Altre domande della stessa sezione</h2>
        <ul id="otherQuestions" class="list-clean"></ul>
      </div>
    </div>
  </main>

  <script src="details.js"></script>
</body>
</html>
